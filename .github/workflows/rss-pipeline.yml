name: RSS Feed Pipeline

on:
  schedule:
    # Run daily at 7am Mountain Time (1pm UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  fetch-and-filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit rss-queue.json back to repo

    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: CanCollab/canadascanada-data
          # If repo is private, add a deploy key secret:
          # token: ${{ secrets.DATA_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run RSS pipeline
        run: python3 rss-pipeline.py

      - name: Check for queue changes
        id: check_changes
        run: |
          if git diff --quiet submissions/rss-queue.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            ITEM_COUNT=$(python3 -c "import json; d=json.load(open('submissions/rss-queue.json')); print(d['meta']['item_count'])")
            echo "item_count=$ITEM_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated queue
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "CanadaScanada RSS Bot"
          git config user.email "bot@canadascanada.ca"
          git add submissions/rss-queue.json
          git commit -m "chore: RSS queue update — ${{ steps.check_changes.outputs.item_count }} items (${{ github.run_id }})"
          git push

      - name: No changes
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "No new relevant items found. Queue unchanged."
